name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
          - os: windows-latest
            cmake_generator: "Visual Studio 17 2022"
          - os: macos-latest
            cmake_generator: "Unix Makefiles"
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -G "${{ matrix.cmake_generator }}" -DEWSP_BUILD_SHARED=ON -DEWSP_BUILD_STATIC=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: ewsp-${{ matrix.os }}
          path: |
            build/libewsp_core*
            build/ewsp_core*
            build/Release/*
