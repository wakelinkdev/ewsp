name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: libewsp_core.so
          - os: windows-latest
            artifact: ewsp_core.dll
          - os: macos-latest
            artifact: libewsp_core.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DEWSP_BUILD_TESTS=ON -DEWSP_BUILD_SHARED=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --config Release --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ewsp-core-${{ matrix.os }}
          path: build/*ewsp_core*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
